services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: viberrands
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TASKS_DB_NAME: viberrands_tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/init_tasks_db.sh:/docker-entrypoint-initdb.d/01-init-tasks-db.sh:ro

volumes:
  postgres_data:
